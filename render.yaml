services:
  - type: static_site
    name: rental-management-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_ASSET_BASE_URL
        sync: false
      - key: VITE_BACKEND_ORIGIN
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
